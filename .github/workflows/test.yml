name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Jest – Node 20
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js 20 LTS with npm cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies (clean install from lock file)
      - name: Install dependencies
        run: npm ci

      # 4. Run full suite WITH coverage (enforces thresholds from jest.config.ts)
      #    Uses the project's own `test:coverage` script so --experimental-vm-modules
      #    and all other flags are kept in sync with your local setup.
      - name: Run tests with coverage
        run: npm run test:coverage

      # 5. Upload the coverage report as a downloadable artifact (90-day retention)
      - name: Upload coverage report
        if: always()          # upload even when tests fail – useful for diagnosis
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 90
