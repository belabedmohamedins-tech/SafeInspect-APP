# .github/workflows/test.yml
#
# Runs the full Jest test suite on every push and pull request.
# Fails the build if any test fails OR if coverage drops below the
# thresholds defined in jest.config.js (coverageThreshold).
#
# What this covers:
#   - Unit tests: repositories, services, hooks, utils
#   - Coverage enforcement: branches 60%, functions/lines/statements 70%
#
# What this does NOT cover (add separate workflows for these):
#   - E2E / device tests (Detox, Maestro) — require a real device or emulator
#   - Expo build checks (eas build --platform android) — run on release branches

name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Jest — unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage --ci --forceExit
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
